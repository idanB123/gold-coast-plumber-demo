<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form shell</title>
  </head>
  <body>
    <form name="quote-request" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote-request" />
      <input type="hidden" name="bot-field" />
      <input type="hidden" name="subject" value="New plumber lead from Harbor Flow Plumbing" />
      <input type="text" name="name" />
      <input type="text" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="suburb" />
      <input type="text" name="service" />
      <input type="text" name="urgency" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
